name: Release CLI (tag)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to publish, for example v1.2.3
        required: true
        type: string

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error title=Invalid release tag::${RELEASE_TAG} must match ^v[0-9]+\\.[0-9]+\\.[0-9]+(-[0-9A-Za-z.-]+)?$"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Generate release notes snippet
        shell: bash
        run: |
          set -euo pipefail

          previous_tag="$(git tag --list 'v*' --sort=-version:refname | awk -v current="${RELEASE_TAG}" '$0 != current { print; exit }' || true)"
          notes_file="${RUNNER_TEMP}/release-notes.md"

          {
            echo "## Changelog"
            echo

            if [[ -n "${previous_tag}" ]]; then
              echo "Recent commits since ${previous_tag}:"
              git log --no-merges --max-count=10 --pretty=format:'- %s (%h)' "${previous_tag}..${RELEASE_TAG}"
            else
              echo "Recent commits for ${RELEASE_TAG}:"
              git log --no-merges --max-count=10 --pretty=format:'- %s (%h)' "${RELEASE_TAG}"
            fi
          } > "${notes_file}"

      - name: Build CLI release artifacts
        run: ./scripts/build-cli-release.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: ${{ runner.temp }}/release-notes.md
          files: |
            dist/cli-release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
