name: Release CLI (tag)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to publish, for example v1.2.3
        required: true
        type: string

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Build CLI release artifacts
        run: ./scripts/build-cli-release.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/cli-release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
