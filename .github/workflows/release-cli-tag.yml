name: Release CLI (tag)

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to publish, for example v1.2.3
        required: false
        default: ""
        type: string

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${{ inputs.tag_name }}"
          if [[ -z "${tag_name}" ]]; then
            tag_name="${GITHUB_REF_NAME}"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${GITHUB_REF_TYPE:-}" != "tag" && -z "${{ inputs.tag_name }}" ]]; then
            echo "::error title=Missing release tag::workflow_dispatch from a branch requires inputs.tag_name"
            exit 1
          fi

          printf 'release_tag=%s\n' "${tag_name}" >> "${GITHUB_OUTPUT}"

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${{ steps.release_tag.outputs.release_tag }}"
          if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]] && [[ ! "${release_tag}" =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}(\.[0-9]+)?$ ]]; then
            echo "::error title=Invalid release tag::${release_tag} must match semver vX.Y.Z(-suffix) or YYYY.M.D(.N)"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release_tag.outputs.release_tag }}

      - name: Generate release notes snippet
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${{ steps.release_tag.outputs.release_tag }}"
          previous_tag="$(git tag --list --sort=-creatordate | awk -v current="${release_tag}" '$0 != current { print; exit }' || true)"
          notes_file="${RUNNER_TEMP}/release-notes.md"

          {
            echo "## Changelog"
            echo

            if [[ -n "${previous_tag}" ]]; then
              echo "Recent commits since ${previous_tag}:"
              git log --no-merges --max-count=10 --pretty=format:'- %s (%h)' "${previous_tag}..${release_tag}"
            else
              echo "Recent commits for ${release_tag}:"
              git log --no-merges --max-count=10 --pretty=format:'- %s (%h)' "${release_tag}"
            fi
          } > "${notes_file}"

      - name: Build CLI release artifacts
        run: ./scripts/build-cli-release.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.release_tag }}
          body_path: ${{ runner.temp }}/release-notes.md
          files: |
            dist/cli-release/*
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Publish Homebrew Formula
        if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
        env:
          HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_FORMULA: ${{ vars.HOMEBREW_FORMULA }}
          RELEASE_REPO: ${{ github.repository }}
        run: |
          export HOMEBREW_TAP_REPO="${HOMEBREW_TAP_REPO:-linhay/homebrew-tap}"
          ./scripts/publish-homebrew-formula.sh --release-tag "${{ steps.release_tag.outputs.release_tag }}"

      - name: Skip Homebrew Formula Publish (missing token)
        if: ${{ secrets.HOMEBREW_TAP_TOKEN == '' }}
        run: |
          echo "Skip Homebrew publish: secrets.HOMEBREW_TAP_TOKEN is empty."
