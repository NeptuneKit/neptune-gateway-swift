name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      perf_gate:
        description: Run the 100k performance gate test
        required: false
        type: boolean
        default: false

jobs:
  test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Swift tests
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.perf_gate }}
        run: |
          swift test

      - name: Run performance gate
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.perf_gate }}
        env:
          NEPTUNE_GATEWAY_PERF_GATE: "1"
        run: |
          swift test --filter PerformanceGateTests/testGatewayStoreHandles100kConcurrentIngestAndQuery
